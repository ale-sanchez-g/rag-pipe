services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - RAG_PIPE_API_KEYS=demo-key:customer-demo:threat-modelling-aws-war
    depends_on:
      - qdrant
