name: Mutation (extended)

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/**'

permissions: {}

jobs:
  mutation-suite:
    name: Extended mutation suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' mutmut==3.2.3

      - name: Run mutation suite
        run: |
          mutmut run --paths-to-mutate retrieval --tests-dir tests/unit
          mutmut results > mutation-extended-report.txt

      - name: Upload mutation report
        uses: actions/upload-artifact@v7
        with:
          name: mutation-extended-report
          path: mutation-extended-report.txt
          retention-days: 30
