name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            path: tests/unit
          - suite: e2e
            path: tests/e2e
          - suite: security
            path: tests/security
          - suite: performance
            path: tests/performance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Validate suite path
        run: |
          if [ ! -d "${{ matrix.path }}" ]; then
            echo "::error::Missing test suite directory: ${{ matrix.path }}"
            exit 1
          fi

      - name: Run ${{ matrix.suite }} suite
        run: python -m pytest "${{ matrix.path }}"

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install build

      - name: Build distribution
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    needs: test
    if: vars.SONAR_PROJECT_KEY != '' && secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=api,evaluation,ingestion,mcp,retrieval
            -Dsonar.tests=tests

  release:
    name: Release artifacts
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
