name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  prebuild-lint:
    name: Pre-build lint (${{ matrix.unit }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - unit: python
            paths: api evaluation ingestion mcp retrieval tests
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: python -m pip install ruff==0.6.9

      - name: Run lint and format checks
        run: |
          ruff check ${{ matrix.paths }}
          ruff format --check ${{ matrix.paths }}

  dependency-pinning-and-lockfile:
    name: Version pinning and lockfile integrity
    runs-on: ubuntu-latest
    needs: prebuild-lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Validate exact pins in pyproject
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text())
          deps = data['project']['dependencies']
          optional = data['project'].get('optional-dependencies', {})
          bad = []
          for dep in deps:
              if '==' not in dep:
                  bad.append(dep)
          for group, items in optional.items():
              for dep in items:
                  if '==' not in dep:
                      bad.append(f"{group}:{dep}")
          if bad:
              raise SystemExit(f"Unpinned dependencies found: {bad}")
          print('All dependencies are exactly pinned.')
          PY

      - name: Ensure lockfile exists
        run: test -f uv.lock

      - name: Install uv
        run: python -m pip install uv==0.5.7

      - name: Deterministic lock check
        run: uv lock --locked

      - name: Deterministic sync check
        run: uv sync --locked --dev

      - name: Fail on lockfile drift
        run: |
          if ! git diff --exit-code -- uv.lock; then
            echo '::error::uv.lock drift detected after deterministic install'
            exit 1
          fi

  sca-exception-expiry:
    name: SCA exception register expiry
    runs-on: ubuntu-latest
    needs: dependency-pinning-and-lockfile
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate .sca-exceptions.json expiry
        run: |
          python - <<'PY'
          import json
          from datetime import date
          from pathlib import Path

          path = Path('.sca-exceptions.json')
          data = json.loads(path.read_text())
          today = date.today()
          expired = []

          def check_entries(namespace, entries):
              for entry in entries:
                  exp = date.fromisoformat(entry['expires'])
                  if exp < today:
                      expired.append((namespace, entry['id'], entry['expires']))

          for namespace, entries in data.items():
              check_entries(namespace, entries)

          if expired:
              raise SystemExit('Expired SCA exceptions: ' + ', '.join(f"{n}:{i}@{e}" for n, i, e in expired))
          print('No expired SCA exceptions.')
          PY

  test-matrix:
    name: Tests with coverage (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: dependency-pinning-and-lockfile
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            path: tests/unit
          - suite: security
            path: tests/security
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' pytest-cov==5.0.0

      - name: Generate machine-readable report
        run: |
          pytest ${{ matrix.path }} \
            --junitxml=junit-${{ matrix.suite }}.xml \
            --cov=api --cov=evaluation --cov=ingestion --cov=mcp --cov=retrieval \
            --cov-report=xml:coverage-${{ matrix.suite }}.xml || true

      - name: Upload raw test evidence
        uses: actions/upload-artifact@v7
        with:
          name: test-report-${{ matrix.suite }}
          path: |
            junit-${{ matrix.suite }}.xml
            coverage-${{ matrix.suite }}.xml
          retention-days: 14

      - name: Enforce test suite
        run: pytest ${{ matrix.path }}

  mutation-test:
    name: Mutation testing (non-blocking)
    runs-on: ubuntu-latest
    needs: test-matrix
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install mutation tooling
        run: python -m pip install -e '.[dev]' mutmut==3.2.3

      - name: Report-first mutation run
        run: |
          mutmut run --paths-to-mutate retrieval --tests-dir tests/unit || true
          mutmut results > mutation-report.txt || true

      - name: Upload mutation report artifact
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutation-report.txt
          retention-days: 14

      - name: Upsert mutation PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          MARKER: '<!-- mutation-summary -->'
        with:
          script: |
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = process.env.MARKER;
            const fs = require('fs');
            const report = fs.existsSync('mutation-report.txt') ? fs.readFileSync('mutation-report.txt', 'utf8').slice(0, 6000) : 'No mutation report generated.';
            const body = `${marker}\n## Mutation testing\n\n\`\`\`\n${report}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  sca-python:
    name: SCA (Python)
    runs-on: ubuntu-latest
    needs:
      - test-matrix
      - sca-exception-expiry
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install scanners
        run: python -m pip install pip-audit==2.7.3

      - name: Report-first dependency scan
        run: |
          python -m pip install -e .
          pip-audit -f json -o sca-python-report.json || true

      - name: Upload SCA report artifact
        uses: actions/upload-artifact@v7
        with:
          name: sca-python-report
          path: sca-python-report.json
          retention-days: 14

      - name: Enforce High/Critical vulnerabilities with exceptions
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('sca-python-report.json').read_text())
          exc = json.loads(Path('.sca-exceptions.json').read_text())
          allow = {e['id'] for e in exc.get('python', [])}
          findings = []
          for dep in report.get('dependencies', []):
              for vuln in dep.get('vulns', []):
                  sev = (vuln.get('severity') or '').upper()
                  vid = vuln.get('id', '')
                  if sev in {'HIGH', 'CRITICAL'} and vid not in allow:
                      findings.append(f"{vid}:{sev}:{dep.get('name')}")
          if findings:
              raise SystemExit('Blocking SCA findings: ' + ', '.join(findings))
          print('No blocking unexcepted HIGH/CRITICAL Python dependency findings.')
          PY

  code-quality-gate:
    name: Code quality gate
    runs-on: ubuntu-latest
    needs: test-matrix
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-report-*
          merge-multiple: true

      - name: Enforce thresholds and generate summary
        run: |
          python - <<'PY'
          import glob
          import xml.etree.ElementTree as ET
          threshold = 0.80
          rows = []
          failed = False
          paths = sorted(glob.glob('coverage-*.xml'))
          if not paths:
              raise SystemExit('No coverage XML artifacts found; failing quality gate.')
          for path in paths:
              root = ET.parse(path).getroot()
              rate = float(root.attrib.get('line-rate', 0.0))
              suite = path.replace('coverage-', '').replace('.xml', '')
              status = 'PASS' if rate >= threshold else 'FAIL'
              if status == 'FAIL':
                  failed = True
              rows.append((suite, rate * 100, status))

          with open('code-quality-summary.md', 'w', encoding='utf-8') as f:
              f.write('| Suite | Coverage % | Status |\\n|---|---:|---|\\n')
              for suite, pct, status in rows:
                  f.write(f'| {suite} | {pct:.2f} | {status} |\\n')
              f.write('\\nMinimum threshold: 80%\\n')

          if failed:
              raise SystemExit('Coverage quality gate failed.')
          PY

      - name: Upload quality summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-summary
          path: code-quality-summary.md
          retention-days: 14

      - name: Upsert code quality PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          MARKER: '<!-- code-quality-summary -->'
        with:
          script: |
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = process.env.MARKER;
            const fs = require('fs');
            const summary = fs.readFileSync('code-quality-summary.md', 'utf8');
            const body = `${marker}\n## Code quality gate\n\n${summary}`;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  production-build:
    name: Production build
    runs-on: ubuntu-latest
    needs:
      - code-quality-gate
      - sca-python
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build tooling
        run: python -m pip install build==1.2.2.post1

      - name: Build distribution
        run: python -m build

      - name: Assert expected outputs
        run: |
          test -f dist/rag_pipe-*.tar.gz
          test -f dist/rag_pipe-*.whl

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*
          retention-days: 14

  container-build:
    name: Container build (no push)
    runs-on: ubuntu-latest
    needs: production-build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: rag-pipe-api:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-smoke:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: container-build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Bring stack up
        run: docker compose up -d --build qdrant api

      - name: Poll health endpoint with timeout
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo 'API is healthy.'
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          echo '::error::Timed out waiting for /health endpoint'
          exit 1

      - name: Run E2E suite with JUnit output
        run: pytest tests/e2e --junitxml=e2e-junit.xml

      - name: Publish E2E test report in checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E smoke
          path: e2e-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            e2e-junit.xml
          retention-days: 14

      - name: Upsert E2E PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          MARKER: '<!-- e2e-summary -->'
        with:
          script: |
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = process.env.MARKER;
            const status = '${{ job.status }}';
            const body = `${marker}\n## E2E smoke\n\nResult: **${status.toUpperCase()}**`;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  performance-test:
    name: Performance test (two-phase)
    runs-on: ubuntu-latest
    needs: e2e-smoke
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Phase 1 (constrained profile)
        run: |
          docker compose down -v || true
          docker compose up -d --build qdrant api
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then break; fi
            sleep 2
          done
          RAG_PIPE_PERF_SAMPLES=10 RAG_PIPE_PERF_P95_SECONDS=0.2 pytest tests/performance --junitxml=perf-phase1-junit.xml

      - name: Reset after phase 1
        if: always()
        run: docker compose down -v

      - name: Phase 2 (full profile)
        run: |
          docker compose up -d --build qdrant api
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then break; fi
            sleep 2
          done
          RAG_PIPE_PERF_SAMPLES=50 RAG_PIPE_PERF_P95_SECONDS=0.05 pytest tests/performance --junitxml=perf-phase2-junit.xml

      - name: Build p95/p99 summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import statistics
          import time
          from urllib import request

          latencies = []
          for _ in range(30):
              start = time.perf_counter()
              req = request.Request('http://127.0.0.1:8000/health')
              with request.urlopen(req, timeout=5) as resp:
                  if resp.status != 200:
                      raise RuntimeError('Health probe failed')
              latencies.append((time.perf_counter() - start) * 1000)

          latencies_sorted = sorted(latencies)
          p95 = latencies_sorted[int(len(latencies_sorted)*0.95)-1]
          p99 = latencies_sorted[int(len(latencies_sorted)*0.99)-1]
          error_rate = 0.0
          with open('performance-summary.md', 'w', encoding='utf-8') as f:
              f.write('| Endpoint | p95 (ms) | p99 (ms) | Error rate |\\n|---|---:|---:|---:|\\n')
              f.write(f'| /health | {p95:.2f} | {p99:.2f} | {error_rate:.2%} |\\n')
          with open('performance-summary.json', 'w', encoding='utf-8') as f:
              json.dump({'endpoint': '/health', 'p95_ms': p95, 'p99_ms': p99, 'error_rate': error_rate}, f, indent=2)
          PY

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-report
          path: |
            perf-phase1-junit.xml
            perf-phase2-junit.xml
            performance-summary.md
            performance-summary.json
          retention-days: 14

      - name: Add performance summary
        if: always()
        run: cat performance-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tear down stack
        if: always()
        run: docker compose down -v
